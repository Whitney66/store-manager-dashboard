<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Manager Dashboard Prototypes</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2d3d;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
    }
    .desc {
      margin: 0 0 32px;
      color: #5b6b7b;
      font-size: 15px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #e6ebf2;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(31, 45, 61, 0.06);
    }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #ecf5ff;
      color: #1677ff;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 10px;
    }
    .text {
      margin: 0 0 18px;
      color: #5b6b7b;
      line-height: 1.7;
      font-size: 14px;
      min-height: 72px;
    }
    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      background: #1677ff;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .footer {
      margin-top: 36px;
      color: #8c9aa8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Store Manager Dashboard Prototypes</h1>
    <p class="desc">用于集中管理店长看板相关高保真原型。每个原型使用独立固定路径发布，后续可直接覆盖同一路径更新，不影响其他原型访问。</p>
    <div class="grid">
      <div class="card">
        <div class="tag">已发布原型</div>
        <h2 class="title">T3员工销售指标分配填报表</h2>
        <p class="text">面向门店、店面、柜组、总店长、店长、店助与员工个人指标分配的高保真原型，支持跨柜组、多店轮动、主归属与分摊规则展示。</p>
        <a class="link" href="./prototypes/t3-staff-target-form/">打开原型</a>
      </div>
    </div>
    <div class="footer">建议将具体原型链接直接分享给业务和产品人员，后续迭代保持链接不变。</div>
  </div>
</body>
</html>
